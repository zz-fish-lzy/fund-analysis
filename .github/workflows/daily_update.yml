name: 基金分析每日更新

on:
  schedule:
    # 交易日 19:00 北京时间 (11:00 UTC) — 完整流水线 + 邮件推送
    - cron: '0 11 * * 1-5'
    # 周末 12:00 北京时间 (04:00 UTC) — 仅新闻同步 + 情感分析
    - cron: '0 4 * * 0,6'
  workflow_dispatch: # 支持手动触发

jobs:
  daily-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install akshare pandas numpy supabase openai requests beautifulsoup4 lxml

      - name: Run daily update
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
          EMAIL_SMTP_SERVER: smtp.qq.com
          EMAIL_SMTP_PORT: '465'
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_AUTH_CODE: ${{ secrets.EMAIL_AUTH_CODE }}
        run: |
          python -m src.daily_update
